<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 350px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
        }
        .lang-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            border-radius: 25px;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .lang-btn:active {
            transform: scale(0.98);
        }
        .btn-jp { background-color: #ff3b30; box-shadow: 0 4px 10px rgba(255,59,48,0.3); }
        .btn-en { background-color: #0076ff; box-shadow: 0 4px 10px rgba(0,118,255,0.3); }
        .btn-th { background-color: #34c759; box-shadow: 0 4px 10px rgba(52,199,89,0.3); }
        
        .loading-text {
            font-size: 14px;
            color: #8e8e93;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Select Your Language</h1>
        
        <a href="./jp-page(TEST)/" class="lang-btn btn-jp">日本語 (Japanese)</a>
        <a href="./en-page(TEST)/" class="lang-btn btn-en">English</a>
        <a href="./th-page(TEST)/" class="lang-btn btn-th">ภาษาไทย (Thai)</a>
        
        <div class="loading-text">Detecting language...</div>
    </div>

    <script>
        // 💡アクセスした人のブラウザ・スマホの言語を自動判定してジャンプします
        window.onload = function() {
            const userLang = navigator.language || navigator.userLanguage;
            
            // 0.3秒だけ選択画面を見せたあと、自動で各フォルダへジャンプ
            setTimeout(() => {
                if (userLang.includes('ja')) {
                    window.location.href = "./jp-page(TEST)/";
                } else if (userLang.includes('th')) {
                    window.location.href = "./th-page(TEST)/";
                } else {
                    // 日本語・タイ語以外はすべて英語ページへ
                    window.location.href = "./en-page(TEST)/";
                }
            }, 300);
        };
    </script>

</body>
</html>
